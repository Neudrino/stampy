name: Stampy Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build plugin zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npm run build

      - name: Install PHP for Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Composer deps (no-dev, optimized)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Inject version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ./dev/inject-version.sh "$TAG"

      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLUGIN_VERSION=$(grep -oP 'Version:\s+\K\S+' stampy.php)
          README_VERSION=$(grep -oP 'Stable tag:\s+\K\S+' readme.txt)
          echo "Tag: $TAG"
          echo "Plugin header: $PLUGIN_VERSION"
          echo "readme.txt: $README_VERSION"
          if [ "$TAG" != "$PLUGIN_VERSION" ]; then
            echo "ERROR: Git tag ($TAG) does not match plugin header ($PLUGIN_VERSION)"
            exit 1
          fi
          if [ "$TAG" != "$README_VERSION" ]; then
            echo "ERROR: Git tag ($TAG) does not match readme.txt stable tag ($README_VERSION)"
            exit 1
          fi

      - name: Stage production artifact
        run: |
          mkdir -p /tmp/stampy
          # Allowlist approach: explicitly copy only what ships in production.
          # This is safer than a denylist (.distignore) because new dev-only
          # files added to the repo are automatically excluded. The .distignore
          # file is kept for the 10up SVN deploy action which requires it.
          cp stampy.php readme.txt uninstall.php LICENSE .distignore /tmp/stampy/
          rsync -a --exclude='vendor-backup' --exclude='.gitkeep' \
            includes/ /tmp/stampy/includes/
          rsync -a --exclude='vendor-backup' \
            build/ /tmp/stampy/build/
          rsync -a --exclude='vendor-backup' \
            vendor/ /tmp/stampy/vendor/
          rsync -a \
            languages/ /tmp/stampy/languages/
          rsync -a \
            assets/ /tmp/stampy/assets/

      - name: Verify staged artifact structure
        run: |
          # The main plugin file must be at the root, not in a subfolder.
          test -f /tmp/stampy/stampy.php
          # vendor/ must be present (Composer prod deps).
          test -d /tmp/stampy/vendor
          # build/ must be present (compiled JS/CSS).
          test -d /tmp/stampy/build
          # readme.txt must be present.
          test -f /tmp/stampy/readme.txt
          echo "Staged artifact structure verified."

      - name: Plugin Check on staged artifact
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '/tmp/stampy'
          categories: 'plugin_repo'
          ignore-warnings: 'true'

      - name: Create zip
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd /tmp
          zip -r stampy-$TAG.zip stampy/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stampy-${{ github.ref_name }}
          path: /tmp/stampy-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/stampy-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
