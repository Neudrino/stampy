name: Stampy CI

on:
  pull_request:
  push:
    branches: [ main ]

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; individual jobs can widen if ever needed.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (JS/TS/CSS)
    runs-on: ubuntu-latest
    # PHP static checks (composer lint / analyse) run in the unit-php job
    # where PHP is available directly on the runner.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint:js
      - run: npm run lint:css
      - run: npm run type-check

  unit-js:
    name: Unit tests (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run test:unit:js

  unit-php:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # '8.4' stands in for "latest" supported PHP.
        php: [ '8.3', '8.4' ]
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: xdebug
      - run: composer install --no-interaction --prefer-dist
      # Run PHP lint + static analysis directly on the runner (host PHP is
      # available in CI, unlike the local dev host which uses the container).
      - run: composer lint
      - run: composer analyse
      - run: composer test:unit

  integration:
    name: Integration (WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wp: [ '7.0', 'latest' ]
    # ubuntu-latest ships Docker preinstalled, which wp-env requires.
    # WP_ENV_HOME must match the value baked into the npm scripts so that
    # bare `npx wp-env run` commands find the running containers.
    env:
      WP_ENV_HOME: ./.wp-env-home
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      # Override the WordPress core version per matrix entry. wp-env reads the
      # WP_ENV_CORE environment variable to override the .wp-env.json "core".
      - name: Start wp-env (WP ${{ matrix.wp }})
        env:
          WP_ENV_CORE: ${{ matrix.wp == 'latest' && 'WordPress/WordPress' || format('https://wordpress.org/wordpress-{0}.zip', matrix.wp) }}
        run: npm run env:start
      # Composer deps must be installed inside the container — vendor/ is
      # gitignored and wp-env mounts the plugin directory read-only from the
      # host, so the host has no vendor/ in CI.
      - name: Composer install (in container)
        run: npx wp-env run tests-cli --env-cwd=wp-content/plugins/stampy composer install --no-interaction --prefer-dist
      - run: npm run test:integration:php
      - name: Upload debug.log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: debug-log-wp-${{ matrix.wp }}
          path: '**/wp-content/debug.log'
          if-no-files-found: ignore

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run env:start
      - name: Composer install (in container)
        run: npx wp-env run tests-cli --env-cwd=wp-content/plugins/stampy composer install --no-interaction --prefer-dist
        env:
          WP_ENV_HOME: ./.wp-env-home
      - run: npm run test:e2e
        env:
          # Browsers already installed above; skip wp-scripts' redundant install.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      # Verify a clean production Composer install (no dev deps).
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-dev --optimize-autoloader

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # vendor/ is gitignored, so the Plugin Check action's wp-env has no
      # Composer autoloader. Install production deps on the runner first;
      # wp-env mounts the plugin directory from the host, so vendor/ is
      # visible inside the container.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-dev --optimize-autoloader
      # Official WordPress Plugin Check action. The repo root contains dev-only
      # files (tests, config, CI) that are not shipped in the production build.
      # We exclude them so Plugin Check only scrutinizes production code.
      - uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '.'
          exclude-directories: 'tests,dev,node_modules,vendor,.github,stubs,.husky'
          exclude-files: |
            phpunit.xml.dist
            phpstan.neon.dist
            phpcs.xml.dist
            phpstan-baseline.neon
            playwright.config.ts
            jest.config.js
            tsconfig.json
            eslint.config.cjs
            .gitignore
            .distignore
            .nvmrc
            .wp-env.json
            .editorconfig
            .gitkeep
            composer.json
            composer.lock
            package.json
            package-lock.json
            PLAN.md
            PROGRESS.md
            AGENTS.md
            README.md
            SECURITY.md
            LICENSE
          ignore-warnings: 'true'

  audit:
    name: Dependency audit (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm audit --audit-level=high || true
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - run: composer audit || true
