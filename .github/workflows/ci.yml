name: CI

on:
  pull_request:
  push:
    branches: [ main ]

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; individual jobs can widen if ever needed.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (JS/TS/CSS)
    runs-on: ubuntu-latest
    # NOTE: PHP static checks (composer lint / analyse) run inside the wp-env
    # container, so they are exercised by the `integration` job rather than
    # here. This keeps `lint` a fast, container-free job.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      # NOTE: Phase 0 may not yet have a committed package-lock.json. `npm ci`
      # requires a lockfile; once other agents commit one this is exact/repeatable.
      - run: npm ci
      - run: npm run lint:js
      - run: npm run lint:css
      - run: npm run type-check

  unit-js:
    name: Unit tests (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit:js

  unit-php:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # '8.4' stands in for "latest" supported PHP.
        php: [ '8.3', '8.4' ]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      # Runs PHP unit tests directly against host PHP (fine on GitHub runners;
      # the local dev host lacks PHP and uses the container instead).
      - run: composer test:unit

  integration:
    name: Integration (WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wp: [ '7.0', 'latest' ]
    # ubuntu-latest ships Docker preinstalled, which wp-env requires.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      # Override the WordPress core version per matrix entry. wp-env reads the
      # WP_ENV_CORE environment variable to override the .wp-env.json "core".
      - name: Start wp-env (WP ${{ matrix.wp }})
        env:
          WP_ENV_CORE: ${{ matrix.wp == 'latest' && 'WordPress/WordPress' || format('https://wordpress.org/wordpress-{0}.zip', matrix.wp) }}
        run: npm run env:start
      - run: npm run test:integration:php
      - name: Upload debug.log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-log-wp-${{ matrix.wp }}
          path: '**/wp-content/debug.log'
          if-no-files-found: ignore

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run env:start
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Verify a clean production Composer install (no dev deps).
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-dev --optimize-autoloader

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Official WordPress Plugin Check action. Inputs may need tuning once the
      # build output layout is finalized; build-dir '.' checks the repo root.
      - uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '.'

  audit:
    name: Dependency audit (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      # Non-blocking for Phase 0: surface advisories without failing the build.
      - run: npm audit --audit-level=high || true
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - run: composer audit || true
